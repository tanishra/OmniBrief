name: OmniBrief — Daily 9AM IST

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  send-digest:
    name: Fetch, Summarize & Send
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      # OPEN SOURCE PERSISTENCE: Restore the DB from GitHub Cache
      - name: Restore History Database
        id: cache-db
        uses: actions/cache@v4
        with:
          path: digest_history.db
          key: omnibrief-history-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            omnibrief-history-${{ runner.os }}-

      - name: Run OmniBrief
        env:
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY:   ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL:  ${{ secrets.RECIPIENT_EMAIL }}
          ADMIN_EMAIL:      ${{ secrets.ADMIN_EMAIL }}
          SENDER_EMAIL:     ${{ secrets.SENDER_EMAIL }}
          SENDER_NAME:      ${{ secrets.SENDER_NAME }}
          GITHUB_TOKEN:     ${{ secrets.GITHUBB_TOKEN }}
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          APP_BASE_URL:     ${{ secrets.APP_BASE_URL }}
          NEWSLETTER_TOKEN_SECRET: ${{ secrets.NEWSLETTER_TOKEN_SECRET }}
        run: python main.py

      # OPEN SOURCE PERSISTENCE: Save the updated DB back to Cache
      # Note: Cache is immutable by ID, so we always use a new key.
      # Github handles the cleanup of old caches automatically.
      - name: Save History Database
        uses: actions/cache/save@v4
        with:
          path: digest_history.db
          key: omnibrief-history-${{ runner.os }}-${{ github.run_id }}

      - name: Upload logs (debug)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: logs-${{ github.run_id }}
          path: "*.html"
          retention-days: 3
